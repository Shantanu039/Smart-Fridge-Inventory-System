<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Setup - Smart Fridge</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; background: #f0f2f5; min-height: 100vh; margin: 0;">

<div class="container" style="max-width: 450px; width: 90%;">
    <section class="scanner-card" style="padding: 40px 30px;">
        <h2 style="justify-content: center; color: var(--purple);">
            <i class="fas fa-microchip"></i> Device Registry
        </h2>
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 25px;">
            Link an ESP32 MAC Address to a User Account
        </p>
        
        <div style="text-align: left;">
            <label style="font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase;">ESP32 MAC Address</label>
            <input type="text" id="espMac" placeholder="32:AE:A4:07:0D:66" required>

            <label style="font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase;">User UID (from Firebase)</label>
            <input type="text" id="ownerUid" placeholder="Paste User UID here" required>

            <label style="font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase;">Username</label>
            <input type="text" id="ownerName" required>
        </div>

        <button class="btn-scan" id="regBtn" onclick="registerDevice()" style="width: 100%; background: var(--purple); margin-top: 20px; height: 50px;">
            <span id="regText">LINK DEVICE</span>
        </button>

        <div id="statusMsg" style="margin-top: 15px; font-weight: 600; font-size: 0.9rem;"></div>
    </section>
</div>

<script type="module" src="db.js"></script>
<script type="module" src="provision.js"></script>
</body>
</html>
