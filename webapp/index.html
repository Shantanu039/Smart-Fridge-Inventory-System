<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fridge Inventory System</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4361ee">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2274/2274757.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2.0">
    
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

<div class="container">
    <header>
        <div style="text-align: left;">
            <h1 style="color: var(--secondary); margin: 0; font-size: 1.4rem;">Smart Fridge Inventory System</h1>
            <small style="color: #666;"><i class="fas fa-user-circle"></i> Welcome, <span id="user-display">User</span></small>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="btn-scan btn-barcode" onclick="location.href='cart.html'" style="padding: 8px 15px; font-size: 0.85rem;">
                <i class="fas fa-shopping-cart"></i> CART
            </button>
            <button class="btn-scan btn-manual" onclick="logout()" style="padding: 8px 12px; font-size: 0.85rem; background: #e63946;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <section class="scanner-card">
        <h2><i class="fas fa-camera"></i> Product Scanner</h2>
        <p>Use <b>Single Scan</b> for all-in-one scanning or follow <b>Step 1 & 2</b> for separate scanning</p>
        
        <input type="file" accept="image/*" capture="camera" id="cameraInput" style="display:none;">
        
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn-scan" onclick="startSingleScan()" style="padding: 12px 20px; flex: 1; min-width: 150px;">
                <i class="fas fa-expand"></i> SINGLE SCAN
            </button>
            <button class="btn-scan btn-manual" onclick="showManualModal()" style="padding: 12px 20px; flex: 1; min-width: 150px;">
                <i class="fas fa-keyboard"></i> MANUAL ENTRY
            </button>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px;">
            <button class="btn-scan btn-barcode" onclick="startBarcodeOnlyScan()" style="padding: 12px 20px; flex: 1; min-width: 150px;">
                <i class="fas fa-barcode"></i> 1. SCAN BARCODE
            </button>
            <button class="btn-scan btn-expiry" onclick="startDateOnlyScan()" style="padding: 12px 20px; flex: 1; min-width: 150px;">
                <i class="fas fa-calendar-check"></i> 2. SCAN EXPIRY
            </button>
        </div>

        <div id="scan-status"><i class="fas fa-info-circle"></i> Ready to scan...</div>
    </section>

    <div id="manualModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Item Details</h3>
            <p id="modal-msg" style="font-size: 0.9rem; color: #666;">Enter product info:</p>
            
            <label style="font-size: 0.75rem; font-weight: 700; color: #888;">PRODUCT NAME</label>
            <input type="text" id="manualName" placeholder="Product name">
            
            <label style="font-size: 0.75rem; font-weight: 700; color: #888;">EXPIRY DATE</label>
            <div style="display: flex; gap: 5px; align-items: center; margin-bottom: 10px;">
                <input type="text" id="manualDate" placeholder="DD/MM/YYYY" style="flex: 1; margin: 0;">
                <input type="date" id="hiddenPicker" style="display:none;" onchange="syncPickerToText(this.value)">
                <button type="button" class="btn-scan" style="padding: 10px 15px; margin:0;" onclick="document.getElementById('hiddenPicker').showPicker()">
                    <i class="fas fa-calendar-alt"></i>
                </button>
            </div>

            <label style="font-size: 0.75rem; font-weight: 700; color: #888;">QUANTITY</label>
            <input type="number" id="manualQty" value="1" min="1">
            
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                <button id="modalConfirmBtn" class="btn-scan" onclick="submitManualEntry()"><i class="fas fa-save"></i> CONFIRM & SAVE</button>
                <button class="btn-scan btn-manual" onclick="closeManualModal()"><i class="fas fa-times"></i> CANCEL</button>
            </div>
        </div>
    </div>

    <div id="notification-area"></div>

    <section>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
            <h2 style="margin: 0;"><i class="fas fa-snowflake"></i> My Fridge</h2>
            
            <div style="display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 5px 15px; border-radius: 8px; border: 1px solid #ddd;">
                <label for="sortDropdown" style="font-size: 0.85rem; font-weight: 600; color: #555;"><i class="fas fa-sort-amount-down"></i> SORT:</label>
                <select id="sortDropdown" style="padding: 5px; border-radius: 5px; border: none; background: transparent; font-family: inherit; cursor: pointer; outline: none;">
                    <option value="expiry">📅 Expiry</option>
                    <option value="name">🔤 Name</option>
                    <option value="quantity">📊 Qty</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: center;">Product</th>
                        <th style="text-align: center;">Expiry Date</th>
                        <th style="text-align: center;">Qty</th> 
                        <th style="text-align: center;">Status</th>
                        <th style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody id="inventory-table">
                    </tbody>
            </table>
        </div>
    </section>
</div>

<script>
  /**
   * SERVICE WORKER BOOTSTRAPPER
   * Caches statutory visual assets locally to optimize offline processing tolerances.
   */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Fail:', err));
    });
  }
</script>

<script type="module" src="db.js"></script>
<script type="module" src="app.js"></script>
<script type="module" src="api.js?v=1.0.1"></script>
<script type="module" src="ui.js"></script>
<script type="module" src="cart_logic.js"></script>

</body>
</html>
